services:
  postgres:
    image: ${DOCKER_PUBLIC_REGISTRY}/postgres:18-alpine
    container_name: api_db
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=room_manager
      - POSTGRES_USER=postgres
    networks:
      - pg_net
  back_end:
    image: ${DOCKER_REGISTRY}/back:${CI_COMMIT_SHA}
    container_name: back_end
    environment:
      - ASPNETCORE_URLS=http://+:4000
      - JWT_SECRET=4c3f3bd13f6e4a6aa3f5c16f2c0d7cc1b2a1d9f84f0a3e5c7b9d2f1a6c4e3b1a
      - SESSION_COOKIE_NAME=rm_session
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/room_manager
    depends_on:
      - postgres
    networks:
      - pg_net
      - api_net
    links:
      - "postgres:db"
    volumes:
      - ./startup:/etc/startup
    entrypoint:
      [
        "/etc/startup/wait-for",
        "-t",
        "30",
        "db:5432",
        "--",
        "dotnet",
        "/app/backend.dll",
      ]
  newman:
    image: ${DOCKER_PUBLIC_REGISTRY}/newman:alpine
    entrypoint:
      ["/etc/startup/wait-for", "-t", "30", "back_end:4000", "--", "newman"]
    container_name: newman
    depends_on:
      - postgres
      - back_end
    network_mode: "service:back_end"
    volumes:
      - ./startup:/etc/startup
      - ./newman/:/etc/newman/
    command: run /etc/newman/roommanager.postman_collection.json -e roommanager.postman_environment.json
networks:
  pg_net:
  api_net:
