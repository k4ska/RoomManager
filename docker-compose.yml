services:
  db:
    image: mirror.gcr.io/library/postgres:16
    container_name: rm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: room_manager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d room_manager"]
      interval: 5s
      timeout: 5s
      retries: 12

    networks:
      - pg_net

  pgamdmin4:
    image: dpage/pgadmin4:9.8
    container_name: pgadmin4
    ports:
      - 8081:80
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=room@manager.com
      - PGADMIN_DEFAULT_PASSWORD=parool
    networks:
      - pg_net

  backend:
    build: ./backend
    container_name: rm_backend
    restart: unless-stopped
    environment:
      PORT: 4000
      NODE_ENV: development
      ASPNETCORE_ENVIRONMENT: Development
      # JWT HS256 requires >= 256-bit (32-byte) key
      JWT_SECRET: 4c3f3bd13f6e4a6aa3f5c16f2c0d7cc1b2a1d9f84f0a3e5c7b9d2f1a6c4e3b1a
      SESSION_COOKIE_NAME: rm_session
      DATABASE_URL: postgres://postgres:postgres@db:5432/room_manager
      CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    container_name: rm_frontend
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:4000
    depends_on:
      - backend
    ports:
      - "3000:3000"

networks:
  pg_net:

volumes:
  pgdata:
